---

- name: Install Nginx
  apt:
    name: "{{ nginx_package }}"
    state: present
    update_cache: yes

- name: Open tcp port 80 in UFW
  ufw:
    rule: allow
    port: '80'
    proto: tcp
  when: not ansible_check_mode

- name: Deploy main nginx.conf with proper includes
  template:
    src: nginx-main.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: '0644'
  notify: Reload nginx

- name: Remove default site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Ensure ACME webroot exists
  file:
    path: /var/www/letsencrypt/.well-known/acme-challenge
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: Deploy vhost for {{ domain }}
  template:
    src: "{{ nginx_conf_src }}"
    dest: "{{ nginx_conf_path }}"
    owner: root
    group: root
    mode: '0644'
  notify: Reload nginx

- name: Check vhost file exists (for check mode)
  stat:
    path: "{{ nginx_conf_path }}"
  register: nginx_vhost_stat

- name: Remove duplicate vhost symlink from sites-enabled
  file:
    dest: "/etc/nginx/sites-enabled/{{ domain }}.conf"
    state: absent
  when: (not ansible_check_mode) or nginx_vhost_stat.stat.exists
  notify: Reload nginx

- name: Validate nginx configuration
  command: nginx -t
  register: nginx_test
  changed_when: false
  failed_when: nginx_test.rc != 0
